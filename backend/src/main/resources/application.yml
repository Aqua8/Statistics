spring:
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${DB_URL:jdbc:mariadb://localhost:3306/dashboard_db}
    username: ${DB_USERNAME:statistics}
    password: ${DB_PASSWORD:123!@#qwe}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

cookie:
  secure: ${COOKIE_SECURE:false}  # 프로덕션(HTTPS)에서는 true로 설정

guest:
  user-id: ${GUEST_USER_ID:3}
  project-id: ${GUEST_PROJECT_ID:1}

rate-limit:
  collect:
    max-requests: 60   # IP당 허용 최대 요청 수
    window-ms: 60000   # 윈도우 크기 (ms), 기본 1분

log:
  retention:
    days: 90  # page_logs 보존 기간 (일). 이보다 오래된 로그는 매일 새벽 2시에 자동 삭제

jwt:
  secret: ${JWT_SECRET:dGhpcy1pcy1hLXNlY3VyZS1zZWNyZXQta2V5LWZvci1kZXZlbG9wbWVudC1vbmx5}
  expiration: 3600000        # 1시간 (ms)
  refresh-expiration: 604800000  # 7일 (ms)

server:
  port: 8080

logging:
  level:
    org.springframework.security: WARN