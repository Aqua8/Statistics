services:
  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: dashboard_db
      MARIADB_USER: statistics
      MARIADB_PASSWORD: "123!@#qwe"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mariadb://db:3306/dashboard_db
      DB_USERNAME: statistics
      DB_PASSWORD: "123!@#qwe"
      JWT_SECRET: dGhpcy1pcy1hLXNlY3VyZS1zZWNyZXQta2V5LWZvci1kZXZlbG9wbWVudC1vbmx5
      COOKIE_SECURE: "false"
      ALLOWED_ORIGINS: "http://localhost"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  db_data:
